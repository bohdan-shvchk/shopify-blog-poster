name: Daily Blog Post

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-minilm-l6-v2-v1

      - run: python poster.py --store my-store
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN_MY_STORE }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - run: |
          git config user.name "blog-bot"
          git config user.email "bot@agency.com"
          git add stores/
          git diff --cached --quiet || git commit -m "log: published blog post $(date +%Y-%m-%d)"
          git push
